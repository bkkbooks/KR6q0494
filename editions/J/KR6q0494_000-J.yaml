front:
  text: 序秀師夙契如來三昧咄咄信是再來甫參雲幻和尚機緣相合即為水乳之投真破山和尚法派當日咸為雲幻得人慶併為破山有傳人慶良不誣也攷其得道時尚在三十五歲而開化吉祥而彌勒州大隱而沅江萬壽而鹿苑而皈依兩紀之內滇蜀大道場早已坐遍就中浩浩灑灑眼筋舌骨弘闡宗風非似他人沾沾錯認片紙黑字也今披閱其語錄吐三十八世真機開七十五燈正眼指示直明那畔雖云片羽已呈苞采寧曰寸臠足賽侯鯖真末法之光明幢也稔知傾動諸方正當天龍推出法嗣嗣宗悠公爰為編次而復有玄微慧初兩公不憚跋涉以本師祖翁東塔示現之地特來禾郡掛瓢於清白大師古新菴梓送大藏流通今而後闇室燈傳指頭月現禾城諸剎雖未獲秀師開堂說法而手持語錄一編已不啻耳提而面命之矣且迴憶疇昔之日祖師破山住錫福城時以大悲閣勝因未就撩起即行重歸湯沐至今猶為遺憾茲得秀公傑出之嗣孫提唱宗傳而當年未竟之勝因不益闡揚而光大之哉是則仰秀師焉抑思破山和尚而不值讀秀師語錄如睹破山和尚一班焉余係門外不敢窺測堂奧而玩其詞繹其旨驚喜信愛之心躍躍烏能已於讚歎也敬為序時康熙歲次甲子仲春上澣文林郎奉天府知海澄縣事雙谿里人江溥洄叟氏謹撰綠蘿恒秀禪師語錄敘萬峰破翁自東塔一番罏鞴而來川中向干戈叢裡建大法幢以維末運海內學者莫不從風而偃若龍之宗而有鱗鳳之集而有翼也其門庭孤峻子孫超卓率皆耆年宿德一點龍睛俱紹弘規吾鄉恒秀禪師弱齡出家問道四方幾經喪亂既弘爍迦之心遂撒懸崖之手最後余相晤於黔之思石間見其雅度玄朗一門深入因爾結茆問難五越寒暑迨虎谿話別相隔旬年戊戌中余有絕域之遊遍歷刀山劍樹生死未了復入五濁而秀師自蜀得天童嫡孫雲幻和尚之法一枝南來丙午冬握手仙湖撫今悼昔則已十有三年矣夫以予百折狂瀾之塵客而對不見不聞之逸致其芰製可楚荷衣可裂也暇則出其示眾小參而余復屢炙其上堂法語言言入木字字頂針且棲心方外化導隨場既不立崖岸於法林豈復爭標幟於莊市臨機問答見病書方觸境歌吟隨風徹籟原無纂述水到渠疏噫是真禪之大總持也歟予雖得及門未曉堂奧中事僅述所見如此明眼作家有深知師者當別有向上全提一著在時康熙己酉長至月東華逸民劉蒞稽首拜題恒秀林禪師語錄目次卷上上堂示眾小參機緣卷下頌古書問真讚雜著佛事行實附錄
