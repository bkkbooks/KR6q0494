body:
  text: 嗣法門人光悠等編住雲南開化府吉祥寺語録康熙戊申九月師在報國受開化太守劉公及衆檀護請住吉祥禪寺十月一日入院山門一彈指頃吉祥門啓宗廟之美百官之富喝一喝便入佛殿城東不欲見佛趙州不喜聞佛山僧到來又作麼生萬事無如和氣好得盤桓處且盤桓乃展拜據室喝一喝云會麼者是人天瞻仰不及處驀卓拄杖云作風作雨任他忙拈護法疏示衆云河山森列將相功勳一句無私當陽獨露正法眼藏總在箇裏如或未委便請表白指法座云占斷毗盧頂不稟釋迦文虛空乘寶座圍繞吉祥雲遂升祝聖畢復拈香云此一瓣香光吞佛祖氣壓諸方伶俜十載一朝擊碎躬承記莂不敢孤負此第一回拈出奉為忠州石寶山萬佛禪寺傳臨濟正宗第三十二世雲幻大和尚用酬法乳斂衣趺坐上首白椎云法筵龍象衆當觀第一義師震威一喝云第一義諦山僧底白椎上座底者裏徹去拄杖子與汝相見問吉祥雲繞吉祥座大轉如來正法輪如何是最初一句師云未到開陽時早向汝道進云恁麼則占斷風規去也師云莫亂走進云還有為人處也無師驀頭一棒問如何是賓主句師云看取令行僧禮拜師乃云吉祥門大啓十方同聚會踏著吉祥地心空始及第即今莫有踏著底麼山僧與你證據如無未免自拈自弄去也喝一喝以拂子擊禪床下座結制黎國興王勝諸居士請上堂十方薄伽梵一路涅槃門窄處通車馬寬處不容針還有透得過底麼問寬窄即不問用透作麼生師云山僧今日失利進云果然現大人相師云險乃云門裏出身易身裏出門難聖人俱從難處易凡夫自向易中難且道迥脫難易一句又作麼生鶴有九皋難翥翼馬無千里謾追風下座上堂豎拂子云突出難辦久參未免躊躇信手拈來後學那知端的會得者白雲萬里不會者明月千江假饒直下承當未免當面錯過良久擲下拂子云還委悉麼六國安寧邊塞靜珠簾高捲竟忘尊一相任護法同諸居士請上堂問蓮花未出水時如何師云蓮華進云已出水時如何師云蓮華進云已出未出時如何師云蓮華蓮華進云直下承當去時如何師云利劍揮空乃云未達境唯心起種種分別達境唯心已分別即不生良久卓拄杖一下云長憶江南三月裏鷓鴣啼處百花香居士丁應龍徐承業邵興諸居士請上堂舉龐居士云難難難拾擔油麻樹上攤婆云易易易百草頭邊祖師意女云也不難也不易飢來喫飯倦來眠師云龐公一家恁麼語話大似從前汗馬無人識秖要重論蓋代功吉祥者裏且不然或有人恁麼道但云鳳鳴曉日秋空靜雨打黃花蝶夢輕元日監院海修請上堂拈香祝聖畢乃云春風笑桃李花鳥繡苔痕寂寂松濤起家家別調新東村頻勸酒西舍醉相迎此中無限趣料得少知音山僧恁麼告報大似境見情生諸兄分上又且如何良久云還委悉麼更有一般奇特處鐵牛産下玉麒麟喝一喝下座解制護法戴惟高請上堂解開布袋口放出一群牛縱橫芳草去得意任優悠任優悠半含春色半含羞舉芙蓉一日辭馬祖祖曰裝卻包了來與汝説一上佛法蓉次日到方丈少頃祖曰時寒善為道路蓉轉至法堂忽然有省師云馬祖平地上推人一跌好與三十拄杖蓉乃隨人起倒也與草鞋一輛今日設有人辭吉祥但向他道春雨濛濛途路滑和風細細上林芳上堂舉石鞏和尚昔為獵人趕鹿從馬祖菴前過問祖曰見鹿過否祖曰汝何人鞏曰獵人祖云汝能一箭射幾箇曰一箇祖云汝不善射曰和尚解射否祖云解曰和尚一箭射幾箇祖云一群曰彼此是生命何用射一群祖云汝既知此何不自射曰若教某甲射只是無下手處祖云者漢曠劫無明煩惱當下頓息鞏即拗折弓箭投祖出家師云石鞏見義勇為真大丈夫馬祖將錯就錯可謂百發百中只是眼孔太窄吉祥則不然等間一箭管教大地人喪身失命何故聻不見道護生須是殺殺盡始安居非涯禪人請上堂山僧久不升此座舌上生塵毛欲布今朝歌首上場詩普請諸人和一和莫有善和底麼一僧才出師驀頭一棒僧一喝師亦打問臨濟在黃檗三度問佛法大意因甚三度被打師便打進云在黃檗下喫苦為甚向大愚處拔本師直打退乃云要明恁麼事須是恁麼人若是恁麼人須解恁麼事便乃拳踢相應唱拍相隨雖然如是要見二老則易要見吉祥則難何故聻有眼無耳朵六月火邊坐住鹿苑寺護法周繼瑗等值佛誕日請上堂問法身無相法海無邊和尚升堂説箇甚麼師云法身無相法海無邊進云某甲不會師云自語尚不會那僧佇思師云法身無相聻僧踊躍禮拜歸位師乃云目顧四方行七步天上天下太孤生當時若遇拏雲手管教大千海嶽平喝一喝下座上堂舉龍潭問古德云某甲自到來不蒙和尚指示心要德曰吾未嘗不指示曰何處指示德曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南吾便低首何處不指示汝心要潭佇思德曰見則直下便見擬思即差潭當下開悟復問如何保任德曰任性逍遙隨緣放曠但盡凡心別無聖解師云古德被龍潭一拶只得淨地上撒屙龍潭當下悟去也是平地喫交今日若有人問鹿苑不蒙和尚指示心要和聲便打管教立地冰消何故聻字經三寫烏焉成馬諸兄還委悉麼聽取一頌心要不勞頻指示十枚曾以一枚還無端特地重申問一棒須教髑髏乾髑髏乾低頭歸去也慚顏己酉秋受彌勒州刺史王希聖護法王世錫等請住大隱禪寺至九月初十日入院三門豎拄杖云無門之門高大難論轉大地山河歸門裏羅十世古今入域中卓一卓遂入方丈舞笏擎叉未免手忙腳亂張弓駕箭射得半箇聖人檢點將來未是超方作者新大隱則不然一句無私彰寶印笑看千嶂起風雷拈護法疏示衆云者是靈山會上付囑來的落在刺史王居士毛錐子頭上山僧不敢囊藏卻煩維那宣過指法座云大法空座佛祖共登山僧到來豈免隨例且道作麼生步驟要提無相毗盧印須向千峰頂上行遂升拈香祝聖畢復拈香云者瓣香三巴林裏得來六詔街頭拈出奉為萬佛禪寺雲幻老人用酬法乳斂衣趺坐上首白椎云法筵龍象衆當觀第一義師云當陽擊碎直下平坦慣戰作家便請直入有麼有麼一僧才出師云好一員戰將僧便喝師便打進云鐵牛不怕獅子吼恰似木人見花鳥師亦打乃云鐵牛不怕獅子吼恰似木人見花鳥木人花鳥本無情一切聖賢如電拂所以終日喫飯不曾嚼一粒米終日著衣未嘗挂一縷絲便能攝無邊剎海於毛端融十世古今於一念出沒卷舒無非佛事逆順去來總是道場任運騰騰全規全規雖然如事你諸人還知落處麼若不藍田射石虎幾乎誤殺李將軍復白椎云諦觀法王法法王法如是下座結制上堂問跳出金剛圈又入獅子窟時如何師云截斷腳跟進云一鎚打就時如何師云看汝伎倆僧便喝師云只恐不是玉是玉也大奇進云騎牛穿市過師云終是淆訛乃云一言截斷千聖消聲一劍當前橫尸萬里所以道護生須是殺殺盡始安居遂顧視左右云千聖不知何處去倚天長劍逼人寒光圓韓夫人供法衣請上堂舉巖頭因沙汰次在甘贄家過夏補衣次贄行過以針作劄勢贄遂整衣欲謝妻問云作麼贄云説不得妻云也要大家知贄舉前話妻云此去三十年後須知一回飲水一回噎女子聞云誰知盡大地人性命被奯上座劄將去也師云巖頭喫了甘贄家飯不守本分反惹他一家人大驚小怪是何心行甘贄聽妻處分也合喫棒即今韓夫人造二十五條衣供奉山僧歷歷金針不昧明明錦縫重開全機顯示獨露當陽一家大小互相作用雖然如是且道與古人是同是別你等諸人還知針頭落處麼良久乃指袈裟云此際山僧才一披如雲普覆華王座卓拄杖下座居士楊真直馮永清請上堂問千年暗室一燈能破因甚還有三尺暗在師云昨日有人從天台來進云某甲不會師云炭裏坐問百尺竿頭如何進步師云退乃云山僧昨來刈茅辛苦正在打睡知客報言衆居士請和尚説法山僧從睡而起只得之乎也者與你諸人一上衆中還有不之乎也者底麼衆無語良久卓拄杖一下云莫謂水寒魚不餌吾今釣得滿船歸護法丁大來詞林劉𦶜等供法被請上堂師指法被云蜀錦吳綾白玉黃金打成一片特地相呈驀拈拄杖云還著得者箇麼復靠拄杖云謾謂須彌藏芥子且看芥子納須彌卓拄杖下座解制上堂衆手淘金誰是得者得也賞你一錠金不得也賞你一錠金何以如此不見道錦衣公子貴林下道人高師誕日得壽李護法及兩序請上堂師顧視左右以拂子打相云大衆會麼秖者生鐵團子多時撒出人前了也同一眼見同一耳聞更要上來下去覓甚縫罅還委悉麼劫石不能比其堅須彌不能匹其量喝一喝下座住沅江府萬壽寺結制上堂士問三界火宅如何避得師云用避作麼士云恁麼則被燒卻了也師云怎怪得山僧士云豈無方便師云隨緣消舊業更莫造新殃問如何是玄要意旨師云併卻咽喉脣吻問將來進云學人併卻了也如何是第一玄師云接竹點青天進云如何是第二玄師云空裏打鞦韆進云如何是第三玄師云藕絲繫鐵船進云如何是第一要師云飢來喫飯進云如何是第二要師云寒來著襖進云如何是第三要師云寒山逢拾得撫掌呵呵笑進云玄要已蒙師指示廬陵米價事如何師云逢貴即賤問如何是火裏栽蓮師云則今便請云恰遇和尚師云可知禮也乃云三界無安猶如火宅驀豎拂子云大衆見麼若也見得徹去變穢邦而成淨土轉火宅而為清涼處一塵而一塵不能移其質歷萬劫而萬劫不能易其長可謂心同虛空界量等虛空壽無生亦無滅無解亦無結淨裸裸脫塵情赤灑灑絶蓋覆直得千聖同躔萬機頓赴還有恁麼人麼見義不為非勇士臨危不變始驚群擊拂子下座上堂舉僧於馬祖前作四畫云上一畫長下三畫短不得道長不得道短離四句答某甲始得祖乃畫一畫云不得道長不得道短答汝了也後僧舉似忠國師忠云何不問我師云者僧畫長道短要且不知飯是米做馬祖恁麼答他其然豈其然乎忠國師云何不問我總與一坑埋卻何故不見道字經三寫烏焉成馬解制上堂二僧齊出師云一箭落雙雕二僧一齊歸位師云死底死活底活乃云山僧去冬此日有一則急要事在諸公分上諸公還知麼若也知得許你放膽摘楊華脫或未然出門便是草住皈依禪寺紳襟張星耀等值佛誕請上堂問和尚燒香慶誕世尊雲門便要打殺且道與燒香慶誕是同是別師云同也同不得別也別不得進云秖如今日和尚上堂有人要打和尚又作麼生師云退身有分進云恁麼則釋迦不前和尚不後師云且照顧腳跟僧便喝師云又被風吹別調中乃云指天指地太郎當萬古千秋是禍殃劄破面門何處去一年一度一燒香卓拄杖下座因事上堂庭前草深一丈格外大用無私從前俱已不是今日又復何非良久云三寸密藏渾是膽一絲才有便成冤住緑蘿山繼祖堂大殿落成衆護法請上堂西堂問梅稍星月弄華香雨衆摩尼越樣妝梁木此時新意氣現前一衆盡稱揚如何是斬新一句師云祥光周法界龍象盡趨奔進云恁麼則大樹之蔭滿中夏去也師云且喜闍黎共證明知客問四衆臨筵共樂升平超宗手眼請師拈出師云杲日麗中天進云恁麼則人人添得一重光彩師云休從他覓維那問如何是緑蘿境師云千峰笑點頭進云如何是境中人師云一句定乾坤進云人境已蒙師指示向上全提事如何師云坐卻舌頭都監問如何是最初句師云末後問將來進云如何是末後句師云最初問將來進云如何是即今一句師云闍黎連日辛苦書記問寒暄宇宙天花落地暖紅爐一片水露地獅兒頭戴雪喚回親見本來人如何是本來人師云自領出去進云一種沒絃琴惟師彈得妙師云又來者裏念篇章悅衆問今日緑蘿上梁卻是釋迦成道還合著也未師云好日多同乃云今日是我釋迦文佛成道之期所以緣蘿大殿落成正用此日兩彩一賽千祥霧集十方聚會萬善雲臻説甚一切衆生具有如來智慧德相但以妄想執著自不證得即今緇素高人箇箇踏著緑蘿者片場地入此無礙法門睹此無量光明盡證菩提悉得心空覓一毫德相了不可得況妄想執著乎雖然如是且道功圓果滿一句又作麼生寶網重重彌億匝聖凡普會日交參卓拄杖下座旦日上堂拈香祝聖畢有二居士齊出作舞而去師云一得一失良久維那云誰得誰失師云劍去久矣汝方刻舟便下座天童密祖忌上堂拈香云惡聲克滿三千界毒氣鬱蒸億萬年觸之則傾湫倒嶽背之則倒嶽傾湫不犯風規如何通信桐溪水急魚行濁太白峰高鶴宿安下座上堂驀拈拂子擊香几一下又連擊兩下光悠西堂白椎云諦觀法王法法王法如是下座佛誕上堂舉世尊才生下一手指天一手指地周行七步目顧四方云天上天下惟吾獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平琅琊云雲門可謂將此深心奉塵剎是則名為報佛恩又云賊過後張弓師云二大老大似潑油救火緑蘿則不然任他稽首麻三斤我但南無乾屎橛且道與古人是同是別還知落處麼遂喝一喝云有佛處不得住無佛處急走過同鄉道舊至上堂巫山一帶錦水吳綾木鵝三峽且聽同音還委悉麼逢源不盡長河起流入滄溟引興長擊拂子下座上堂拈香示衆云者瓣香是從無量劫來自心中流出光明烜赫為祥為瑞為蓋為雲爇向爐中供養三世諸佛歷代祖師併天下老和尚伏願道心堅固種智圓明遂敷座乃云國家柱石佛法金湯現成公案本願力故頓開千眼坐斷十方明明絶滲漏歷歷無覆藏直下分明是箇本來面目有時抹過太虛空踏殺南山鱉鼻蛇不為分外且道功用兩忘一句又作麼生到頭霜夜月任運落前溪佛成道日上堂值雪大地盡成銀色界長空普放玉毫光瞿曇冷坐孤峰頂凍落當門齒一雙乃豎柱杖云大衆見麼釋迦老子來也口喃喃底道奇哉奇哉一切衆生具有如來智慧德相但以妄想執著而不證得山僧看來盡大地人被他塗污一上不同小小即今還有不被他塗污自解作活底麼衆皆沉吟師云依舊隨他腳底忙上堂上苑春華取次開庭前燕子語喈喈箇中會得真消息何必胡僧特地來卓拄杖下座示衆辛亥秋師命門人光碧等掃雙桂破山師翁塔回持天童密祖像及師翁所受密祖二十五條衣繼席雲嶠和尚轉授萬壽到山示衆云天童密雲老和尚及我破山師翁源來曹水振起滹沱父子相承的骨的髓遞至於我未有了期故萬壽祖天童而翁雙桂也乃舉起袈裟云者是師翁留鎮醉佛樓的今日落在林上座手裏對衆顯示非圖報德酬恩秖願天下衲僧鼻孔端正毛羽鮮潔人人水草具足箇箇腳跟點地雖然如是還有滅卻正法眼藏驀栽荊棘底麼出來道看良久衆不出師云且到祖堂燒香著中秋示衆金風凋落千林色雨過青山翠潑門竹影掃階塵不動月穿潭底水無痕此四句內有一句有照有用有主有賓若檢點得出明頭也合暗頭也合若檢點不出頭上漫漫腳下漫漫遂以拂子擊禪床云還會麼月明此夕清光滿秋老長空萬里天雙桂破師翁忌日示衆以拂子點空云呵㖿呵㖿春水滿泗澤夏雲多奇峰秋月揚明輝冬嶺秀孤松仰面覓地底頭視天水作何色柳緑含煙世諦流布底似鴨聞雷途中受用底如龍得水正與麼時且道師翁鼻孔落在甚處良久云阿㖿阿㖿雲幻老和尚忌日示衆昔年石寶室中相見不相識今日緑蘿堂上相識不相見大衆為甚石寶室中相見不相識他賺我碓觜花開香朵朵因甚緑蘿堂上相識不相見我賺他依舊百花開碓觜遂舉香云還委悉麼秪因者著翻成錯撼嶽旋乾宇宙昏示衆若論箇事不但山僧口挂壁上直饒三世諸佛也説不到歷代祖師也行不到假使行説俱到正好喫棒何故聻理長則就小參小參舉雲門云結夏得數日寒山子作麼生溈山云結夏得數日水牯牛作麼生象崖云結夏得數日拄杖子作麼生師云三大老雖然同放不同收究竟何曾異者裏翻覆數來百千番依舊當年李八伯山僧者裡不然結夏得數日肚裏有飯身上有衣便是安樂法門且道與古人是同是別試定當看定當得出橫身當宇宙遍界絶遮藏若定當不出業識忙忙無本可據還委悉麼甜瓜徹蒂甜苦瓜連根苦啓隆王護法誕日請小參舉那吒太子析骨還父析肉還母然後現本身為父母説法今日督府王居士總不恁麼只將一味無米飯供養大衆請山僧為二親説法山僧夜來枕上作得一偈今日舉似大衆良久云忘卻了也拄杖子你還記得麼同坑無異土喝一喝下座解制小參問自從那畔歸王化直至如今徹骨寒師云大衆見你敗闕進云竿頭絲線從君弄不犯清波意自殊師便打乃舉葉縣省和尚示衆云達磨西來直指人心見性成佛獨標萬象物外宣揚悟之者纖毫不隔迷之者背覺合塵中下之機也須仔細莫虛度時光況以西來的意教外別傳道契一言縱橫自在打破髑髏揭卻頂蓋豈不慶快師云大衆葉縣雖然腳下無私須防泥裏有棘還委悉麼一把柳絲收不得和煙搭在玉闌干曳拄杖下座師誕日小參蛾眉女子裙拖地無位真人首摩天一點靈光含萬象蟭螟眼裏打鞦韆若向者裏瞥去不但山僧性命不消一捏以至三世諸佛歷代祖師如按指掌脫或未然諸人性命又落在山僧手裏還瞥也未良久云釣來明月賣風流拾得黃金如糞土靠拄杖下座機緣僧問如何是佛師云眉橫眼上鼻長觜邊云天不能蓋地不能載時如何師云腳跟下一場懡㦬僧問盡大地是箇眼睛乞師指示師云盡大地是箇眼睛指示甚麼僧擬師驀頭一棒僧問學人有一問在和尚處師云山僧住持事繁云和尚何得忘卻師云大地絶塵埃僧佇思師打云頭上喫棒口裏喃喃僧問一切諸法本來是有那箇是無師云是有是無汝自知之云也要問過師云險僧問祖師西來當為何事師云不為別事云罷卻干戈也大難師云有甚奇特云不是苦心人不知師云腦後見腮莫與往來僧問學人皂白不分乞師方便師云你眼在甚麼處僧無對師便打退僧問世智辨聰總不要拈出還我話頭來師便打云瞪目不見邊際時如何師云苦僧問上苑春早到百華競秀開若能轉物則同如來還有不被物轉底麼師云孟八郎漢云只得物我同歸時如何師云出身猶可易脫體道應難督府王護法問昨日殺人今朝禮佛是同是別師云車不橫推理無曲斷云善惡兩忘時如何師云可知禮也刺史王居士問山中有千年葛藤之利器如何斬得師云將葛藤來與汝斬士沉吟師云絆殺人絆殺人僧問凡聖交參時如何師云驗出你骨髓云棒喝交馳時如何師云裂碎你心膽云如何是無底意旨師云聲震大千士問三藏教中即不問黃龍三關意如何師云不許夜行投明須到云如何是我手何似佛手師云摸著鼻孔打失口云如何是我腳何似驢腳師云踢到三山五嶽云佛手驢腳與生緣又是阿誰師云與我過拄杖子來士擬議師云棒頭直下無生忍擬議尋思隔萬山姚文學參師云居士何來云江南師云江南與者裡相去多少士鼓掌云一二三四五師云遠之遠矣云和尚是何心行師云念子遠來三十棒且待別時士便作禮師云喫茶去僧問汾陽三訣意旨如何師云汾陽無此説云如何是第一訣師云子規啼出血云如何是第二訣師云夜行莫踏白云如何是第三訣師云拔出眼中楔云盡力道不得底句分付阿誰師云孟八郎僧禮拜師便打云拶門弟子光定弘徹對嘉興吳知先書倪爾繩刊康熙甲子年仲春吉旦禾郡楞嚴寺般若坊藏板
