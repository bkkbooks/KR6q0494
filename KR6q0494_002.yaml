body:
  text: 嗣法門人光悠等編頌古世尊初生天上人間誰似君放開圭角便稱尊雖然萬古無倫匹幾箇知恩解報恩夜睹明星冷坐六年成戲耍等閒覷得眼皮穿眼皮穿一道神光爍大千世尊拈華瞿曇纔露鋒鋩迦葉眼中著楔疑殺百萬人天箇箇證龜成鱉阿難持缽王舍城中持缽去威儀整肅到人間可憐孤負婆心切猶待門前倒剎竿女子出定廓然大定等虛空女子瞿曇伎未窮縱使罔明能出得青山依舊白雲中鎮州蘿蔔鎮州蘿蔔也尋常拈出令人腳底忙堪笑刻舟求劍漢夜深猶憶下滄浪破山足痛者回敗闕豈尋常失足縣巖自肯當卻被樵夫親見得忙施一掌破天荒牧牛頌殷勤直上最高峰撥艸撩風翠藹中煙水重重何處覓奮身又過白雲東披雲轉步別峰頭尋到無尋便了休偶爾谿邊露箇跡新蹄渡水帶煙流雲深谿渺入無邊步步追尋卻宛然露地穩眠渾不顧森森頭角鎖蒼煙雖然擒下氣昂昂擺尾搖頭劣性狂惡辣鞭繩時在手金鍼習慣自歸降水艸頻添牧養勤時加鞭策沒因循馳驅不犯人苗稼放去收來漸漸純倒跨牛兒意興狂橫吹短笛曲無腔而今莫訝歸來晚此事從來沒覆藏鞭繩擲下渾忘工眠雲枕石睡方濃一聲野韻殊天籟不出白雲谷口中彈指人牛俱已忘騰騰任運絕商量東西南北渾無礙逼塞虛空也不妨百川眾派皆歸海萬嶺千山到嶽邊信手拈來無不是任從滄海變桑田橫肩楖栗到人間為度群迷出市廛狹路相逢穿耳客趁他平步上層巔聯芳偈浩然讀印黃檗室中三頓棒大愚脅下便還拳老僧伎倆隨施設付柄吹毛續正傳皎月光文萬峰山頂桂雙開風送秋香特地來輕折一枝分付汝直教馥郁賺英才嗣宗光悠憶昔靈山拈一枝飲光微笑露全機老僧翻藉瞿曇手歷代相承祖道輝續之光世一條拄杖逞風流豎去橫來得自由隨放隨收隨作用逢羊虎角跨龍頭藍田光碧輔弼叢林獨汝先不敲文字不參禪吾今與柄鈯鋤子任運隨緣得自然長目光電出窟威獰任縱橫堂堂大用許誰尊當陽一喝分賓主見者聞之喪膽魂慧初光定綠蘿中毒已多年苦侍巾瓶豈偶然放出人天隨作用五湖一缽濟高賢月霞寂慧老僧年邁喜閒暇嬾著袈裟經幾夏付與闍黎任意披大千剎土無縫罅玄微徹禪人芒鞋親授汝親承踏遍諸方不二門直下頓明玄要旨大開隻眼定乾坤真讚初祖西天二十七東土第一祖分身遍剎塵處處揚家醜揚家醜箇箇面南觀北斗天童密祖老和尚讚握條拄杖開張臭口把四十九年家活一捏粉碎千七百則骨董一線穿下悟卻震旦多少人賺殺天下英傑漢放出尋常腳手打開一條活路直待江河競注之時方纔掉轉風帆即今海內能有幾人不遭魔魅者哉試道看雙桂師翁破老和尚讚破翁喫了曹山酒痛罵諸方五味禪拄杖橫行天莫測是凡是聖任人傳呵呵大千沙界海中漚一切聖賢如電拂中峰幻老和尚讚白雲人間來不染飛塵跡有時幻出中峰頂遠近駭蒼黃有時斂跡何有鄉人天失瞻仰丹青傳不真變換千般樣夫是謂之雲幻和尚自讚歸根請破盡家私三十年歸根那復圖吾相等閒拋出金剛圈徒與人間生悵望真才請望之儼然默默無言因甚如此我不會禪光電上座請這箇不情漢子何假圖相逢人無貴賤驀頭便頓棒逆風吹了順風吹見者無不生訕謗只好狎泉石以自娛豈可與兒孫作榜樣普明請三十二相無此相八十種好無此好參天荊棘驀門栽引惹人間增懊惱咄書問復劉太史諱蒞護法道學篤至絕去世味斫額相望非一日矣故每接德音一讀三歎不謂老護法垂念法門之深切且喜能以正知止見振起儒釋從上家聲得不令人私心愛之慕之但未審何時下我久縣之榻耳承諭戒以遲起謹遵藥石然邊地瘴霧不時長作似不能久處待來春戒期之後輕衣薄裳曳杖而來與護法徜徉於松石之間一開懷抱或可期也通本師幻老人昔年鈍置深蒙痛棒撇轉機輪親承印可是以法乳之恩未報省覲之禮還虧恭惟老和尚擊大法鼓吹大法螺縱奪隨宜絕萬端之穿鑿生殺自在翦諸見之稠林化頑石而作佛標黃葉以為金法門有賴祖燄重光發林樗櫟庸材伶仃泉石竊擬混跡白雲無如檀護之堅請雖然出醜人前誠恐罪戾於法社間有一二偈語未就齎呈慈覽暫修寸敬聊表芹私恕百千之罪咎乞億萬之仁慈也前辛亥秋專使雙桂齎奉片檀掃師翁之塔併此以聞統祈慈炤寬宥不情不勝惶悚之至謹啟上天童法叔大和尚啟伏以慧日光通萬彙森羅裡許慈雲瑞靄一天淨絕微塵那邊引帶霎時人境悉翻空者畔昭垂滿座主賓齊踊躍妙契心傳媲飲光如是如是嚴提法令超臨濟諦觀諦觀恭惟天童堂上法叔大和尚靈鍾大峨峰香象撐天建極秀毓滄溟水鐵航破浪乘風數載烏藤雨點只期桶底惟穿幾經白晝雷轟看取米篩相應北到南參都盧手眼翻筋斗西來東印微細毫毛輥繡毬凜凜禪風第一綿綿記莂無雙燦然佛祖宗猷允矣帝王師範發林雙桂嫩杪不忘木本靈根萬工餘波有溯水源清致奈緣調恙滇土舉步維艱猶愧守愚綠蘿將敬何似特令光定等懷片檀香致煩西峰我淨代為發林拜掃祖翁寶塔虔備輶禮專伸法叔獅𢋇治齋治供獻嚫獻芹伏願握向上風規驚起雞足之定展衲僧巴鼻挽回熊耳之宗俯念遐私垂青法語頓令迤雲方惺惺得俾苾草更欣欣發林曷勝激切屏營之至復西峰法侄我淨禪師並謝一花五葉幽香廕繼於雙桂而雙桂之幽香亦廕遍於天下也雖則各擅家聲起化門之鐸未有如我法伯福深德厚感招克家之後裔令雙桂之幽香又有托於靜公操手弘興從唐至清千有餘年之蕭寺煥然一新矣兼之請藏及安置上二代之塔並二代之語錄俱刊歸藏海可見家聲者亦未有如賢侄迥出世人頭地也欣羨欣羨茲雖專使掃我伯塔者六千里程止齎片檀奉薰靈幢因三十年前侍巾瓶於大酉洞天蒙施十戒深受訓益不過聊表寸心何乃敢煩金心代為上堂垂示法語附還山中令天末是善益深加信念愈弘贊揚其君子成人之美不過是也此段因緣豈獨愚之深感則青松必不敢笑象幻二老矣臨穎神馳葛藤謝復原韻滇山楚水萬千重走侍鞋穿字腳空幸得靜公伸隻手頻拈柏子觸翁翁復壽官保城壁馬檀越山埜在萬峰時耳食威名嚮往十有六年矣及壬辰萍寄阡陽為武陵楊公所留相去麾幢僅百里不獲一覲龍光為歉後晤燕和尚備道護法留心此事時有所得山僧深為助喜信乎無始以來慧燈不昧照耀今古非尋常根器可同日而語也昨接來教字字似從拈花微笑處融會而來雖然礙處非墻壁通處沒虛空護法應久徹此理也待躬謁戟門把手一笑復開化米二尊昔佛印禪師與蘇端明以文字交為禪喜三昧心切慕之而竟不能彷彿其萬一昨以中秋後一日得聆謦欬所謂吐白鳳而吞雲夢者公之謂也直令山埜過屠門而大嚼不亦快乎佳作既成便中相示以此代玉帶之鎮何如復沅江王護法數蒙注念殊缺報謝雲水萍蹤諒不以世法相拘也老居士弘護法門深根固蔕加以堅持淳素厭薄浮囂舉家事佛清淨為業得不出龐公一頭地也山僧敢為饒舌且道者一頭地是何意旨幸通消息堪作驢年舊友承頒鼎貺向人天眾前結一不思議功德緣耳他時後日自爾受用不盡時值風便裁復併謝與余山法兄和尚向在東山一晤臨風擊節忽焉幾易歲星矣無如老病相侵樗櫟自守豈若老法兄之令行滇南而道播寰海者歷三十餘載持此一片不倦之婆心豈小補哉當嘉運初度之日任豎剎竿於昆池使一切人未得者得未證者證弟以事不從心坐乖嘉會耑遣侍僧代為致敬聊具不腆惟冀莞存願言珍愛以臻遐嘏為祝與密印法兄和尚湖海茫茫五濁遍地當此際者駕鐵船遊陸地格格難入矣奈何奈何客秋策杖欲上雞足忽遇貴門人得讀尊錄不但頓開弟之茅塞真令法門生色祖燈長耀於兄有後望焉聞有退閒之舉曷不再聲塗鼓使百千年後當有聞之而死者則法兄後之垂範寧有窮乎愚固若此兄意何如今貴執旋楚聊附菲供以致芹私伏惟莞存不盡依馳附雙桂雲嶠法叔和尚來書萬峰門庭高在天表其間垂手堅貞殫心竭力惟公唯能耳某株守雙桂不及撐住遠承物儀卻乃不恭受之惶愧茲讀法錄鉗錘妙密風高價重更冀留心盡善盡美可謂希世之珍也特寄老人法衣頂像及天童師翁真軸併愚叔拙偈付諸來人第恨途遙見晤無由聊布寸楮馳候併復價重風高自不同頂門眼正有全功操持臨濟金剛劍倜儻揚岐栗棘蓬鐵壁銀山隨作用魔宮虎穴任流通攝將中外無邊剎併入鉗錘罏韝中雜著復白谿戴居士次來韻二首大隱市朝小隱山世情冷暖一齊刪紅塵易盡因先覺白業須勤最後關澗底遊魚吞皓月巖前石虎抱兒還從容話與維摩詰只在當人返照間道者幽棲世味輕也知隨分樂生平烹茶汲水邀明月種竹鋤雲了幻情黃菊共看知有句青山相對復何聲舉心恐落枯禪病一種平懷自坦行遊華藏寺次太史劉護法韻樓閣門開不二關到來華雨麗其間庭前嫩柳舒青眼澗外寒梅展翠顏太史藤疏蜂釀熟僧巖松韻鶴吟還謾將儒釋窺門戶人是人非總擲閒步靈隱法伯和尚紫皇閣元韻地闢潕陽懸古洞層樓百尺倚長天飛泉濺石分江韻幽鳥穿華破樹煙帳幔紫雲垂岸艸竿欺碧水拜池蓮雖然毒鼓聲消後法令猶然見大全同文燮姚護法坐雨華舫姚拈雨絲風片煙波畫船八字於首并限韻雨過平林泛埜谿絲竿斜釣夕陽西風旛墻尾招雲鶴片石灘頭賺澤鵜煙樹重重樵徑曲波光漾漾海天齊畫圖一派堪幽賞船泊蘆華鳥亂啼贈久默靜主多年住錫碧峰頭一默如愚得自由閒玩白雲眠埜岸靜觀明月載虛舟青山縹緲寒煙翠玉練橫拖紫氣浮高枕松床清夢穩渾忘人世幾春秋與和宛樊子兼別遍尋知己入雲端長嘯一聲天地寒岐路盡經愁裏過千峰又到眼中看老僧下榻常留客樊子灰心嬾做官珍重臨行一句子這回不必問豐干分松嶺步天隱法兄和尚韻奇分峻嶺幾時栽氣合連枝闢不開盤結虯龍騰碧漢斑斕石虎嘯莓苔披雲帶月磨今古覆蓋垂陰任往來雪後始知君獨操亭亭角立占高魁示真玄上人雞群獨立鳳凰兒欲得高飛且待時飲啄莫隨愚伴侶依棲許共聖賢師敲空有響非他物擊木無聲秪自知透過者些玄要句乾坤拈作一聯詩聖徵管護法同真玄上人及諸子請遊太平寺太平原是舊同群攜手相將把韻分天地不言都是字水雲有句盡皆文風生滿座華驚落賦就憑闌日夕曛吟到無吟吟始妙一聲啼鳥隔塢聞除夕自住山來不計年柴扉靜掩枕高眠是非絕倒何興廢行業那能驗劫前懶把新詩黏素壁惟翻舊案閱殘篇木雞啼徹鐘聲動又點霜花上鬢顏初夏步法叔蓮月和尚韻南薰來殿閣入室轉清涼新雨增晴爽奇雲巧樣妝兒蛙鳴碧沼乳燕舞茅堂剩得驚人句何妨對月商夏日過題清涼菴煙澹風清處山深月色涼到門無曲徑入戶有花香談笑竟終日拈題興亦狂新篁初出土冉冉綠成行山行倚杖觀山好物華更有情青松長秀麗白石少枯榮得句鶯聯韻忘情鷗不驚鋤雲開古徑誰共此中行舟中摘葉辰谿下孤帆竟日投人從舟上渡影向霧中收起落波層疊參差岸樹流煙村分曲折此際晚堪留水墨畫屏粼粼秋似碧一片淡如神綠柳谿邊密白雲天際頻好花長歲茂奇果四時新樹樹飛寒玉丹心絕點塵庚申秋再至皈依寺幾載離斯地翻然曳杖來艸香新過雨寺古舊生苔再到拈華處重臨點石臺秋蛩鳴素壁歸賦報君栽重九登煙霞山此日逢重九登臨興亦奢天高澀雨露竹密隱人家怪石倦趺坐疏籬晚放華無風吹帽落絕勝在煙霞航園中作一航綠蔓長可以共雲廚瓜瓞如星墜芙蕖似鏡舒花間新蝶舞籬側舊鶯呼隨分生涯足偏宜拙者圖山居山深地僻絕人還霧鎖苔封竟日閒媿我憨憨無別計新松帶雨種林間同庭表王先生登東山樓次韻攜笻緩步上層樓佇立憑欄一展眸回首忽驚雲影散遠山突出碧如秋丙申訪劉太史一自阡陽分手後韶華又度十年餘客中秋色隨愁記及至相逢半句無謝刺史王護法飯僧雲廚寂寂斷炊煙入市化糧空缽還不是維摩出隻手破沙盆子不圓全復語嵩法兄和尚來韻雙桂門高日正紅道標風遠沒西東家聲重震唯兄力愧我無能繼此宗初雪王護法索偈昨夜漫空匝地堆龐公曾送客泉來當時若遇山僧在拈起一團打落腮己酉中秋同我淨知玄二法姪夜坐寂寂清輝月正圓風搖竹影拂窗前流光欲度山僧榻開戶何妨讓半間與梅眼法侄禪師柳眼拖金梅眼開清香遍界絕纖埃冰心自不同時調豈是陽春和得來示玄微記錄擲釣江邊那計秋煙波影裏任沉浮綸竿忘倦頻添餌不釣金鱗誓不休示辨才侍者口如缾瀉未為奇直下翻身事可期覷破娘生親面目再來喫棒未遲遲與慧光禪人堅侍西峰請藏回更持先哲到滇來山家無物酬行腳笑指床頭破艸鞋示湛微禪人老大方知世念灰發心鏟草乞吾儕從今為汝解粘去他日應須笑一回示含微禪者一塵含法界大定等虛空禪者須親薦天然意氣中示靈虛庫司揚岐燈盞明千古寶壽生薑辣萬年惟我庫司伎倆別許多滋味不如鹽示以權監院人能弘道道能優非道弘人人自投珍重長年遵聖哲殘羹剩飯似今秋示朗朗禪者楚歸大地山河腳底收烏藤撥轉洞庭秋艸鞋錢價差多少算得來時不浪遊示融然禪者楚歸楚水滇雲路渺茫途遙不計腳頭長艸鞋到處通消息法法頭頭自肯當示馨埜行者佛法無多貴久長莫行岐路錯商量心期遠嶺南佛始信當人一段香示自心禪者楚歸楚行來去八千里會得絲毫猶未隔百步源歸一步初逢人漫道腳跟徹示門人掃天童塔偈二首命伊拜掃天童去太白峰高貴竭誠努力向前登極頂自然親授祖叮嚀曾孫受法廿五秋木本水源尚未酬命爾天童觀境界萬工池也水悠悠酬藿思李先生給照門人掃天童塔兼感懷二首昔在靈山曾有約君為柱石我為僧果承弘護因非淺大轉法輪濟上乘法海滔滔福海清萬山聳翠壽山崢是僧不仗山河倚山亦無僧安可禎示鶴友禪人人友鶴兮鶴友雲翱翔天際可同群禪人素志如雲鶴物外翛然獨羨君示靜修上座靜裏工夫閒裏證一絲不合不相宜有時動靜俱忘卻忘到無忘始是奇示月輝禪者磨磚作鏡鏡何光鼻孔依然眼下藏不信但看潭底月清輝耿耿露堂堂示震音靜主一音演唱古今同震起猶能望在公莫戀白雲深處好白雲深處艸茸茸示月霞書記回川一缽煙霞去故鄉腳跟下事氣昂昂這回踏著自家底不負峨嵋老放光示鏡微知客東風纔拂碧桃開何事靈雲笑滿腮珍重逢人謾舉似莫教混入著疑猜示天生書記行腳去去來來有甚由艸鞋幾破價難酬只須提起吹毛利剖出天生第一頭示覆隱監院搬柴運水老闍黎赤手調羹六味宜格外家聲藏不得拈來物物是珍奇示歸根禪人蕭蕭黃葉對君飄著意聽聲聲轉遙片片不隨流水去歸根滿地落枝稍示尼聞菴平田之下古南章出箇尼師牙爪長不惜當陽為點出驀頭一棒絕商量示聞一監院和顏為眾特殷勤因果分明絕點塵但使此心常不昧他年頭角自崢嶸示光照任居士單刀直入展雄威剖破當人第一機坐致太平無箇事只教明月增光輝與光相安護法宰官身也比丘心兩相雙垂護法城物外經綸培種智流芳千古播仁聲喜光中陳居士得子德善仁賢久植耕老來天賜一麒麟君看世上尊榮者盡是從前福慧因復東山法兄止和尚冰泉弄影次來韻泉開石壁水雲圖弄影神駒是有無竹舞斜風魚不餌莫教明月墮冰壺示真陽李居士善覺堂前一片地莫教荒卻變桑田掀翻時把靈苗種果熟香飄不計年示悟道向居士一葦傳來直指禪單刀直入貴心堅目前斬卻閒機境驀地頓開火裏蓮示真直楊居士聞君學道心真切動靜勿忘這箇事一念純清萬念休一超直入如來地示真德道婆持齋念佛要殷勤便是離塵出苦津日用尋常莫棄捨聲聲喚醒夢中人示弘珗李夫人富貴聰明非偶得還從那畔久栽培現今受用無窮盡大好從頭檢點來瀑布哮吼雲中煙外流奔流倒挂玉龍浮光涵秋色連天碧亂撒珍珠未肯休蚤梅玉骨雲埋帶雪芳孤標耿耿占春光山前昨夜通消息時拂清香到艸堂半松軒偶吟老學逃禪天外天誅茅縛蓋半松軒苔深路滑無來客肯把浮名播在先卜吉塘樂農人秉性純良脈結迴龍卜吉塘碧水有情能遞事濁兮殃也總成祥綠蘿八景綠蘿山獨立嵯峨勢插天樵歌牧笛近雲邊眾山一目如屏帳幾片落霞共錦連繼祖堂柏子燈分雙桂來綠蘿叢裡祖堂開直教獅子長為吼走破英靈幾艸鞋龍松崖勢摩雲漢踞雄峰頭角森森煙霧中傳說當年沾國澤龍崖種滿大夫松九曲溪漩流洄伏遶山川九曲名谿月一灣波綠涵空疏影淡藤華兩岸點苔斑上方閣畫閣凌空勢接天雲霞縹緲雜爐煙登臨可共天人語俯視群巒只一拳雙獅峰雙雙雄踞一峰頭臥雪眠霜盡日幽牙爪通身輕不露全機隱伏混春秋煙竹嶺綠竹漪漪翠帶煙虛心勁節勢摩天投林金鳳長需蔭浮世何如君獨賢樂農村綠陽峰下樂農村淺水平田亦可耕富庶如今通至化絃歌不減武城聲示玉琢侍者歸里春水漲平橋波濤怒亦哮珍重玉禪者牢把浪中稍示玉璋侍者一片藍田玉琢磨便圭璋有時彰大用汝器豈尋常示參識禪人入道有多門單參者一著直教漆桶穿大似破灶墮示尼光相道無男女相殷勤貴向上猛然省得來聖凡不兩樣示真麟張夫人福從真實得果向善心生念佛心無退飄然出化城示真鏡道婆真鏡似秋月不磨光皎潔照徹歲寒心無得亦無說示純和禪人峰頂搆茅室通身煙霧侵偶來城市裏只說白雲心示太枝靜主何來行腳士住錫白雲間地僻無塵到柴門靜不關春晴風和花吐氣日麗柳含煙逸興東郊外農夫畔在田壁間竹影欲拈拈不起擬撥撥不開壁上磨窗影風生亦快哉寒潭秋月碧潭徹骨冷秋月重點景試問山中人幾曾來照影示玄印侍者一念不生萬念自灰惟有者箇放去收來行實師於辛亥冬染疾日久上首弟子讀印率眾上方丈作禮白云某等雖親侍老和尚有年未敢叩請和尚行腳乞慈悲為說作將來模範師曰某才疏智淺德涼行寡自救不了豈可為後學作範模耶眾堅請不已師曰山僧乃西蜀鄰陽人也祖諱許遜父諱仲登母何氏弟兄四人予處最小生前勝國天啟丙寅實今皇代天命七月念三日也時方髫齡見伯父仲科日修靜業偕僧梵唄整肅遂猛出塵之念白父父不允即不食母曰若食即許遂送辯融師剃落法名行林後易發林未幾融師別去父兄接回予不茹葷後依伯父言轉送至碧雲菴雲峰師處供事有尊宿號笑破者予敬禮焉一日影師兄問如何是生死大事破應聲曰將得生死來也未影禮拜破便打予在旁不覺驚疑汗出遂屢求指示破曰欲明生死大事須參箇萬法歸一一歸何處話頭話頭若破則生死不必問人也予雖耿耿在懷不知下手工夫後往隱微座主處聽講楞嚴至見見之時見非是見見猶離見見不能及與萬法歸一疑情頓發遂請益座主主以道理釋之又到埜愚座主處問答一如乃歸本菴見破師破便問你這許多時在甚麼處予吐實情便蒙開示稍覺有些進益時闖寇入川有長者曰國運將傾死生何逃予愕然曰生死未明乃遭此際奈何哉於是急回省親不日寇至焚殺殆盡父兄散去漸離鄉井幾至餓死途中走到鎮安訪卓爾座主隨敏悟師賣薪度日有鄒士謂敏曰吾欲此子贅婿何如敏曰你自問他予聞逃去敏亦尾後同參破石和尚寇亦至石又遯去敏死生相顧謂予曰吾老朽勿我慮恐汝年幼虛卻前工予曰誓不以此苦退失初心敏曰汝若此吾何多囑潸然別去予趨酉陽參象崖和尚值佛誕日得稟沙彌十戒更號恒秀一日象問曰如何是有主沙彌予曰和尚尊重象曰山僧耳聵時長破和尚自川來與方丈和尚夜話予瞌睡長曰者瞌睡漢予微笑長忽以袖掩予口云笑什麼便打予通身汗下思此大事愈加迷悶便染大病湯水不入者屢日轉更惶恐自忖參禪日久今在病中工夫全無靈驗走白象象曰你今日方信老僧話也予遂死誓拚捨身命咬定牙關單提一歸何處三四日間病乃稍退放身便臥忽生慚愧急起撲地有省次日上方丈禮謝象問病中還作得主麼予云時起時倒象曰萬法歸一聻予曰紅爐燄裏雪花飛象曰拶予禮拜象便打自此巾瓶三載因象和尚示寂事畢便回本庵破曰久不見汝還我艸鞋錢來予作掌勢破休去一日破問狗子還有佛性也無予曰道什麼破便打予曰趙州猶在便隨破師閱藏於思南得參丈雪和尚丈問那裏來予曰思南觀音閣丈曰大悲千手眼那箇是正眼予便喝丈便打又到石谷和尚處石曰小者何來予云老者何住石云大家在這裏予禮拜云適來觸忤和尚石曰先師去世時上座在否予云忝侍巾瓶石曰有何祥瑞予云紅霞蔭碧落白日麗須彌石曰即今又作麼生予云天下太平石曰不妨驚人辭去抵石扦得圓具於破石和尚處不意通城殿下及劉太史強住須谿遂約同參念餘人打七至第六夜聞報鐘聲脫然徹去不見有一物為礙悲喜交集又值戒和尚示寂門下無人予於廬塔一十三載時天隱和尚有書欲予出山不得已往見之隱便問向聞子名未見子形覿面一句作麼生道予云十箇指頭八箇又隱曰大似保福道底予便問世尊未出母胎度人以畢意旨何如隱曰梅開不待春風發予云百雜碎了也次日隱示予偈曰坐破蒲團一物無已知無物是工夫云云遂辭回向梵晉山住靜三載庚子秋有萬峰之行與本師雲幻和尚邂逅相逢冤家聚首是年三十五歲也壬寅元旦師上堂拈拄杖示眾云吞卻乾坤世界了也你諸人若眼目定動白雲萬里予出問乾坤世界即且置子承父業時如何師云好手手中呈好手紅心心裏中紅心便將源流拄杖袈裟一齊擲下曰吾得本師寶印三昧以來未常輕許一人今日事不獲已轉授於汝善自護持云云予意秪圖自了隈嵒傍穴以適餘生豈敢出醜人前卻被你諸人及劉太史眾護法勉予應箇時節做成不了公案以至逗漏及此是不唧溜中之不唧溜漢也若是伶俐衲僧舉尾知頭那有許般工夫毋勞久立伏惟珍重綠蘿禪寺碑記夫佛祖以一大事因緣故出現於世究其所以無非開覺群迷俾明自性而已然眾生根器不齊則自性豈易明歟且爾迷途未復菩提涅槃尚在遙遠苟不遵修福慧以基之何由得達於彼岸哉蓋恒禪師之闢綠蘿繼祖堂者原佛祖之心行知眾生不能自拔方便演唱隨機淺深譬如大海蚊虻阿修羅飲者皆得飽滿而弘法利生之心至悉矣秀師得法於蜀都破山師翁嫡嗣雲幻和尚自是遊黔而來說法於滇之開化吉祥蒙自鹿苑彌勒大隱沅江萬壽雖住諸大名剎毫無假借既謝事吉祥退隱綠蘿頓成寶所千峰拱峙疊嶂飛雲谿流環澗洄遶平田可耕可食無適不好獨怪綠蘿乃荊棘場地虎跡狼跡樵歌放牧俱不敢入不知幾許年來特留此片袈裟地以待恒禪師作開山鼻祖事亦奇矣總之時節因緣斯院也始創於丁巳之春而成於戊午之夏雖猓僰之眾趨走恐後而佛殿法堂而方丈三門而廚庫寮舍而寶像莊嚴金輝玉射交光映徹前後所費豈止一二千金而工不下萬餘也飯堂食眾濟濟多士法席之盛滇南罕見成千古之祖域為現今之法窟也時節因緣苟可強乎時有里人譚璉王伯鼎等將謎奈寨無主荒田若干畝該糧一石五斗歲歲賠納民甚苦之於是僉議送入綠蘿而作焚修常住聽其徒眾招佃開墾惟辨正項錢糧特以此意達之於余余亦為國賦有賴民累以除梵剎可永一舉而三得焉乃盡免其雜派差役任給照以存之乃勒石垂諸久遠以為後之不知者示也嗟乎莫為之前雖盛而弗傳不為之記雖美而弗彰今有其地有其堂有其田有其僧俾能世世守之燈之續之於以供奉千百年之香火晨昏鐘鼓以提撕警覺於愚不肖則此一寶坊雖在蠢爾椎結之中端不異西方極樂國土矣因為之記而說偈曰天生綠蘿不崩不騫星霧在址雲泉在巔神龍守之破荒立禪綠蘿既開式是蓮臺瞻之仰之以奉如來維彼夷方狡焉其狂仇則爾記恩則爾忘一眥一睚何時可解其愆如山其業如海願爾有眾勿貪勿嗔種此菩提以樹爾身願爾有眾勿軋勿傾飲此甘露以淨爾心世界何窄心性何寬諸天佛祖與爾同歡罔念則狂返念則覺雖則殊方有同極樂康熙己未孟夏開郡守建陵恕菴何清撰沅江開郡安南樂農四眾同刻沅江阿迷彌勒蒙白既山縣開化安南樂農皈依弟子信官李壽等同刻伏願法界之內華藏海中人人自性宗通個個心華燦發情與無情同緣種智門人光定玄微校對嘉興吳知先書倪爾繩刊康熙甲子仲春吉旦禾郡楞嚴寺般若坊藏板附錄天童叔翁上山下曉老和尚為雲南恒秀法姪掃南山先老和尚祖塔請上堂佛佛授手祖祖傳持開鑿人天眼目挽回上古風規此乃我密祖崛起太白勒轉滹沱時之機用普天匝地緇流莫不遭其塗毒受其噓吹然克紹嫡傳秖獲二六真種茲馳瓣香遠供塔頭即法伯雙桂老人之嫡孫恒秀林公也能於滇黔繩其祖武飲水知源難忘木本不遠萬里虔齎淨資恭啟山僧向人天眾前為伊拈出驀豎拂子云大眾且道拈出後如何優曇花正開清香來不徹擲拂子下座復書伏以大道無方敲唱全憑乎師子祖燈赫奕弘揚必賴乎偉人雖域有九區而法無二致縱途分南北而轍合古今惟我恒公賢姪和尚心傳雙桂派出天童寶劍橫揮開瘴癘於桂林象郡慈雲遍溥振滹沱於滇水黔川化被南天聲馳嶺表實惟師門有幸三十八世之獦獠重見于今真乃孝念殷誠十千餘里之窣堵遙虔瞻禮三門增彩四眾歡騰切惟朽髮白齒頹德涼道儉肩祖庭之巨任日夕徬皇接玉啟之揄揚中心愧悚清齋上獻大惠均霑遠承申請欲鼓兩片脣皮深自思惟卻無一言可說憑宣膚語勉應來機即所謂驚雞足之定挽熊耳之宗者奚不深有望於賢姪也耶雲天修遠良晤難期草復神馳曷勝繾綣寄贈太白燈傳黔水外繩其祖武最艱時不忘木本馳天末信是吾家白額兒
